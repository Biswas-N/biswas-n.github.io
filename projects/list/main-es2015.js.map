export default "<div class=\"section is-medium\">\n  <div class=\"box tile is-ancestor\">\n    <div class=\"tile\">\n      <figure class=\"image is4by3\">\n        <img src=\"{{data.image}}\" alt=\"Image\">\n      </figure>\n    </div>\n    <div class=\"tile is-parent is-vertical\">\n      <div class=\"tile is-parent\">\n        <div class=\"tile is-child\" style=\"margin-left: 8px;\">\n          <p class=\"subtitle is-6\">{{data.date}}</p>\n          <p class=\"title is-spaced\">{{data.title}}</p>\n          <p class=\"subtitle\">{{data.subtitle}}</p>\n          <p *ngIf=\"hasSeeMore()\" class=\"subtitle\"><a href=\"{{data.seeMore}}\"\n              class=\"button is-small is-link is-light is-rounded\">See more details</a></p>\n        </div>\n      </div>\n      <div class=\"tile is-parent\">\n        <div class=\"tile is-child\">\n          <p class=\"title is-4\">Tech Used</p>\n          <div class=\"tags are-medium\">\n            <span *ngFor=\"let tech of getTechUsed() | keyvalue\" class=\"tag is-{{tech.key}} is-light is-rounded\">{{tech.value}}</span>\n          </div>\n        </div>\n        <div *ngIf=\"hasClient()\" class=\"tile is-parent\">\n          <div class=\"tile is-child\">\n            <p class=\"title is-4\">Client</p>\n            <figure class=\"image is-128x128\">\n              <img src=\"{{data.client}}\">\n            </figure>\n          </div>\n        </div>\n      </div>\n    </div>\n  </div>\n</div>\n"
